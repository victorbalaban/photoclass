name: photoclass
description: Photo Classification Platform

version: 0.0.1+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing (Web URLs like /login, /admin)
  go_router: ^17.3.0

  # Networking
  dio: ^5.9.2

  # File picking for Web photo uploads
  file_picker: ^11.0.2

  # Country picker for user profile
  country_picker: ^2.0.27

  # Dropzone for web drag-and-drop uploads
  desktop_drop: ^0.7.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5  
  
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.2

flutter:
  uses-material-design: true  